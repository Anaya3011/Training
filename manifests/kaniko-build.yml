apiVersion: v1
kind: ConfigMap
metadata:
  name: session-app-source
  namespace: registry
data:
  Dockerfile: |
    FROM node:20-alpine
    WORKDIR /app
    COPY digest-auth.js app.js ./
    EXPOSE 8080
    CMD ["node", "app.js"]
  app.js: |
    const http = require('http');
    const os = require('os');
    const { DigestAuth } = require('./digest-auth');

    const INFINISPAN_URL = process.env.INFINISPAN_URL || 'http://infinispan:11222';
    const CACHE_NAME = process.env.CACHE_NAME || 'sessions';
    const USERNAME = process.env.INFINISPAN_USER || 'admin';
    const PASSWORD = process.env.INFINISPAN_PASS || 'changeme';

    const auth = new DigestAuth(USERNAME, PASSWORD);

    async function ensureCache() {
      const res = await auth.fetch(`${INFINISPAN_URL}/rest/v2/caches/${CACHE_NAME}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 'distributed-cache': { mode: 'SYNC' } }),
      });
      if (!res.ok && res.status !== 409) {
        throw new Error(`failed to create cache: ${res.status} ${await res.text()}`);
      }
    }

    async function bumpSession(sessionId) {
      const key = encodeURIComponent(sessionId);
      const getRes = await auth.fetch(`${INFINISPAN_URL}/rest/v2/caches/${CACHE_NAME}/${key}`);
      const count = (getRes.status === 200 ? parseInt(await getRes.text(), 10) || 0 : 0) + 1;

      const putRes = await auth.fetch(`${INFINISPAN_URL}/rest/v2/caches/${CACHE_NAME}/${key}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'text/plain' },
        body: String(count),
      });
      if (!putRes.ok) {
        throw new Error(`failed to write session: ${putRes.status} ${await putRes.text()}`);
      }
      return count;
    }

    const server = http.createServer(async (req, res) => {
      if (req.url === '/healthz') {
        res.writeHead(200);
        return res.end('ok');
      }

      const url = new URL(req.url, 'http://localhost');
      const sessionId = url.searchParams.get('session') || 'default';

      try {
        const count = await bumpSession(sessionId);
        res.writeHead(200, { 'Content-Type': 'application/json' });
        res.end(JSON.stringify({ sessionId, count, servedBy: os.hostname() }));
      } catch (err) {
        res.writeHead(502, { 'Content-Type': 'application/json' });
        res.end(JSON.stringify({ error: err.message }));
      }
    });

    ensureCache()
      .then(() => server.listen(8080, () => console.log('session-app listening on 8080')))
      .catch((err) => {
        console.error('failed to initialize infinispan cache', err);
        process.exit(1);
      });
  digest-auth.js: |
    const crypto = require('crypto');

    // Infinispan's REST API only enables HTTP Digest auth by default (no plain
    // Basic), so this implements RFC 7616 digest by hand instead of pulling in a
    // dependency for it.

    function hash(algorithm, text) {
      const alg = algorithm && algorithm.toUpperCase().includes('SHA-256') ? 'sha256' : 'md5';
      return crypto.createHash(alg).update(text).digest('hex');
    }

    function parseChallenge(header) {
      const params = {};
      const re = /(\w+)=(?:"([^"]*)"|([^\s,]+))/g;
      let match;
      while ((match = re.exec(header)) !== null) {
        params[match[1]] = match[2] !== undefined ? match[2] : match[3];
      }
      return params;
    }

    class DigestAuth {
      constructor(username, password) {
        this.username = username;
        this.password = password;
        this.challenge = null;
        this.nonceCount = 0;
      }

      buildAuthorizationHeader(method, requestUri) {
        const c = this.challenge;
        this.nonceCount += 1;
        const nc = String(this.nonceCount).padStart(8, '0');
        const cnonce = crypto.randomBytes(8).toString('hex');
        const algorithm = c.algorithm || 'MD5';
        const ha1 = hash(algorithm, `${this.username}:${c.realm}:${this.password}`);
        const ha2 = hash(algorithm, `${method}:${requestUri}`);
        const qop = c.qop ? c.qop.split(',')[0].trim() : undefined;
        const response = qop
          ? hash(algorithm, `${ha1}:${c.nonce}:${nc}:${cnonce}:${qop}:${ha2}`)
          : hash(algorithm, `${ha1}:${c.nonce}:${ha2}`);

        let header = `Digest username="${this.username}", realm="${c.realm}", nonce="${c.nonce}", uri="${requestUri}", response="${response}", algorithm="${algorithm}"`;
        if (qop) header += `, qop=${qop}, nc=${nc}, cnonce="${cnonce}"`;
        if (c.opaque) header += `, opaque="${c.opaque}"`;
        return header;
      }

      async fetch(url, options = {}) {
        const parsed = new URL(url);
        const requestUri = parsed.pathname + parsed.search;
        const method = options.method || 'GET';
        const send = (headers) => fetch(url, { ...options, headers: { ...options.headers, ...headers } });

        if (this.challenge) {
          const res = await send({ Authorization: this.buildAuthorizationHeader(method, requestUri) });
          if (res.status !== 401) return res;
        }

        const probe = await send({});
        if (probe.status !== 401) return probe;

        const wwwAuth = probe.headers.get('www-authenticate');
        this.challenge = parseChallenge(wwwAuth);
        this.nonceCount = 0;
        return send({ Authorization: this.buildAuthorizationHeader(method, requestUri) });
      }
    }

    module.exports = { DigestAuth };
---
apiVersion: batch/v1
kind: Job
metadata:
  name: kaniko-session-app
  namespace: registry
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: kaniko
        image: gcr.io/kaniko-project/executor:latest
        args:
        - --dockerfile=/workspace/Dockerfile
        - --context=dir:///workspace/
        - --destination=192.168.8.250:30500/session-app:1.0
        - --insecure
        volumeMounts:
        - name: build-context
          mountPath: /workspace
      volumes:
      - name: build-context
        configMap:
          name: session-app-source
