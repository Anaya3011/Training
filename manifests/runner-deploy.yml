# Registration tokens expire after 1 hour - if the pod fails to register
# or is restarted after the token expired, fetch a fresh one from
# POST /repos/{owner}/{repo}/actions/runners/registration-token and
# replace RUNNER_TOKEN's value below.
apiVersion: v1
kind: Secret
metadata:
  name: gha-runner-token
  namespace: apps
type: Opaque
stringData:
  token: AXZEJM7WF2ZHNZCESQCJBU3KL5EOY
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gha-runner
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gha-runner
  template:
    metadata:
      labels:
        app: gha-runner
    spec:
      serviceAccountName: gha-runner
      containers:
      - name: runner
        image: 192.168.8.250:30500/gha-runner:1.0
        env:
        - name: GITHUB_OWNER
          value: Anaya3011
        - name: GITHUB_REPO
          value: Training
        - name: RUNNER_NAME
          value: k8s-lab-runner
        - name: RUNNER_TOKEN
          valueFrom:
            secretKeyRef:
              name: gha-runner-token
              key: token
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
