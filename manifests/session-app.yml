apiVersion: v1
kind: Namespace
metadata:
  name: apps
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: session-app
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: session-app
  template:
    metadata:
      labels:
        app: session-app
    spec:
      containers:
      - name: session-app
        image: 192.168.8.250:30500/session-app:1.0
        ports:
        - containerPort: 8080
        env:
        - name: INFINISPAN_URL
          value: http://infinispan.infinispan.svc.cluster.local:11222
        - name: CACHE_NAME
          value: sessions
        - name: INFINISPAN_USER
          value: admin
        - name: INFINISPAN_PASS
          value: changeme
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: session-app
  namespace: apps
spec:
  type: NodePort
  selector:
    app: session-app
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: session-app
  namespace: apps
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: session-app
  minReplicas: 1
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 60
