# Bootstrap-only, applied manually once - see README. Contains a GitHub PAT,
# so this file is NOT pushed to the repo with a real token filled in; the
# placeholder below is replaced with a fresh token at apply time.
apiVersion: v1
kind: Secret
metadata:
  name: training-repo
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
stringData:
  url: https://github.com/Anaya3011/Training
  username: any-non-empty-string
  password: REPLACE_WITH_GITHUB_PAT
